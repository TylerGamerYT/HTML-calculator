<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        .calc-body { background: #1e293b; width: 400px; padding: 20px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        #display { 
            width: 100%; height: 80px; font-size: 32px; text-align: right; margin-bottom: 20px; 
            border: none; background: #0f172a; color: #38bdf8; border-radius: 12px; padding: 15px; outline: none;
        }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        button { 
            padding: 12px 5px; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; 
            background: #334155; color: #f1f5f9; transition: 0.1s;
        }
        button:hover { background: #475569; }
        .op { background: #0369a1; }
        .fn { background: #4b5563; color: #60a5fa; font-weight: bold; }
        .eq { background: #0ea5e9; grid-column: span 2; font-size: 20px; }
        .ac { background: #be123c; }
    </style>
</head>
<body>

<div class="calc-body">
    <input type="text" id="display" placeholder="0" readonly>
    <div class="grid">
        <button class="fn" onclick="math('abs')">|x|</button>
        <button class="fn" onclick="math('log')">log</button>
        <button class="fn" onclick="math('ln')">ln</button>
        <button class="fn" onclick="add('(')">(</button>
        <button class="fn" onclick="add(')')">)</button>

        <button class="fn" onclick="math('sin')">sin</button>
        <button class="fn" onclick="math('cos')">cos</button>
        <button class="fn" onclick="math('tan')">tan</button>
        <button class="fn" onclick="math('pow2')">x²</button>
        <button class="fn" onclick="add('**')">xʸ</button>

        <button class="fn" onclick="math('inv')">1/x</button>
        <button class="fn" onclick="math('exp')">eˣ</button>
        <button class="fn" onclick="math('pi')">π</button>
        <button class="fn" onclick="math('e')">e</button>
        <button class="op" onclick="add('%')">%</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button class="ac" onclick="clr()">AC</button>
        <button class="ac" onclick="del()">←</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button class="op" onclick="add('*')">×</button>
        <button class="op" onclick="add('/')">÷</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button class="op" onclick="add('+')">+</button>
        <button class="op" onclick="add('-')">−</button>

        <button onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
        <button class="fn" onclick="math('sqrt')">√</button>
        <button class="eq" onclick="solve()">=</button>
    </div>
</div>

<script>
    const s = document.getElementById('display');
    const add = v => s.value += v;
    const clr = () => s.value = "";
    const del = () => s.value = s.value.slice(0, -1);
    const solve = () => { try { s.value = eval(s.value); } catch { s.value = "Error"; } };

    function math(type) {
        let v = parseFloat(s.value) || 0;
        switch(type) {
            case 'abs': s.value = Math.abs(v); break;
            case 'log': s.value = Math.log10(v); break;
            case 'ln':  s.value = Math.log(v); break;
            case 'sin': s.value = Math.sin(v * Math.PI / 180).toFixed(4); break;
            case 'cos': s.value = Math.cos(v * Math.PI / 180).toFixed(4); break;
            case 'tan': s.value = Math.tan(v * Math.PI / 180).toFixed(4); break;
            case 'pow2': s.value = Math.pow(v, 2); break;
            case 'inv': s.value = 1/v; break;
            case 'exp': s.value = Math.exp(v).toFixed(4); break;
            case 'pi': s.value += Math.PI.toFixed(4); break;
            case 'e': s.value += Math.E.toFixed(4); break;
            case 'sqrt': s.value = Math.sqrt(v); break;
        }
    }
</script>
</body>
</html>
